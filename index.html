function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function load(){let d=localStorage.getItem(storageKey);if(!d){localStorage.setItem(storageKey,JSON.stringify(defaultData));d=JSON.stringify(defaultData)}return JSON.parse(d)}
function save(d){localStorage.setItem(storageKey,JSON.stringify(d))}
function fillCategories(){let select=document.getElementById("categoryFilter"),cats=["All",...new Set(load().map(x=>x[0]))];select.innerHTML=cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}
function render(){let data=load(),q=document.getElementById("searchInput").value.toLowerCase().trim(),cat=document.getElementById("categoryFilter").value,box=document.getElementById("list");let shown=data.filter(x=>(cat==="All"||x[0]===cat)&&(!q||x.join(" ").toLowerCase().includes(q)));document.getElementById("counter").textContent=`Showing ${shown.length} / ${data.length} sentences`;box.innerHTML=shown.map((x)=>{let i=data.indexOf(x);return `<div class="card sentence-card shadow-sm mb-4"><div class="card-body p-4"><span class="tag">${esc(x[0])}</span><h3 class="english mt-3">${esc(x[1])}</h3><hr><p class="chinese">${esc(x[2])}</p><button class="btn btn-ghost me-2" onclick="speak(${i})">Speak</button><button class="btn btn-outline-danger" onclick="removeItem(${i})">Delete</button></div></div>`}).join("")}
function addSentence(){let e=document.getElementById("englishInput").value.trim(),c=document.getElementById("chineseInput").value.trim();if(!e||!c)return alert("Please complete both fields.");let d=load();d.unshift(["Personal",e,c]);save(d);document.getElementById("englishInput").value="";document.getElementById("chineseInput").value="";fillCategories();render()}
function removeItem(i){let d=load();if(!confirm("Delete this sentence?"))return;d.splice(i,1);save(d);fillCategories();render()}
function speak(i){let text=load()[i][1];speechSynthesis.cancel();speechSynthesis.speak(new SpeechSynthesisUtterance(text))}
fillCategories();render();
</script>
