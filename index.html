<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IELTS English Library</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#fff4ef;font-family:"Segoe UI",Arial,sans-serif}.navbar-custom{background:#ff5722}.title{color:#ff5722;font-size:42px;font-weight:700}.subtitle{font-size:20px;color:#666}.card{border:0;border-radius:18px}.sentence-card:hover{transform:translateY(-3px);transition:.2s}.english{font-size:25px;font-weight:600;line-height:1.6;color:#222}.chinese{font-size:21px;line-height:1.7;color:#666}.tag{background:#ff5722;color:white;border-radius:20px;padding:5px 14px;font-size:14px}.form-control{font-size:18px;padding:14px}.btn-orange{background:#ff5722;color:white;font-size:18px}.btn-orange:hover{background:#e64a19;color:white}
</style>
</head>
<body>
<nav class="navbar navbar-dark navbar-custom"><div class="container"><span class="navbar-brand fs-3">IELTS English Library</span></div></nav>
<div class="container py-5">
<div class="text-center mb-5">
<h1 class="title">Academic English Sentence Library</h1>
<p class="subtitle">IELTS · TOEFL · Academic Writing · Advanced Expression</p>
</div>
<div class="card shadow-sm p-4 mb-5">
<h3>Add Sentence</h3>
<input id="englishInput" class="form-control mb-3" placeholder="English sentence">
<input id="chineseInput" class="form-control mb-3" placeholder="Chinese translation">
<button onclick="addSentence()" class="btn btn-orange">Add Sentence</button>
</div>
<div id="list"></div>
</div>
<script>
const defaultData=[
["Technology","The rapid development of artificial intelligence has fundamentally transformed the way people work, communicate, and solve complex problems.","人工智能的快速发展已经从根本上改变了人们工作、交流以及解决复杂问题的方式。"],
["Education","Education should not merely provide students with theoretical knowledge; it should also cultivate critical thinking and practical abilities.","教育不应该仅仅提供理论知识，还应该培养学生的批判性思维和实践能力。"],
["Environment","Environmental protection requires global cooperation because ecological challenges often transcend national boundaries.","环境保护需要全球合作，因为生态挑战通常超越国家边界。"],
["Society","Social media platforms have significantly influenced public opinion by determining what information receives widespread attention.","社交媒体平台通过决定哪些信息获得广泛关注，显著影响公众观点。"],
["Economy","Economic growth should be balanced with sustainable development to ensure long-term prosperity.","经济增长应该与可持续发展保持平衡，以确保长期繁荣。"],
["Globalization","Globalization has created numerous opportunities while also introducing challenges related to cultural identity and economic inequality.","全球化创造了大量机会，同时也带来了文化认同和经济不平等方面的挑战。"],
["Academic","It is widely acknowledged that technological innovation plays a crucial role in improving human living standards.","人们普遍认为，技术创新在提高人类生活水平方面发挥着关键作用。"],
["Opinion","In my opinion, governments should adopt effective policies rather than relying solely on market mechanisms.","在我看来，政府应该采取有效政策，而不是完全依赖市场机制。"],
["Science","Scientific research provides valuable insights into solving global challenges and improving human development.","科学研究为解决全球挑战和促进人类发展提供了重要见解。"],
["Career","A successful career requires not only professional knowledge but also adaptability and continuous learning.","成功的职业生涯不仅需要专业知识，还需要适应能力和持续学习。"]
];
function load(){let d=localStorage.getItem("sentences");if(!d){localStorage.setItem("sentences",JSON.stringify(defaultData));d=JSON.stringify(defaultData)}return JSON.parse(d)}
function save(d){localStorage.setItem("sentences",JSON.stringify(d))}
function render(){let box=document.getElementById("list");box.innerHTML="";load().forEach((x,i)=>{box.innerHTML+=`<div class="card sentence-card shadow-sm mb-4"><div class="card-body p-4"><span class="tag">${x[0]}</span><h3 class="english mt-3">${x[1]}</h3><hr><p class="chinese">${x[2]}</p><button class="btn btn-outline-danger" onclick="removeItem(${i})">Delete</button></div></div>`})}
function addSentence(){let e=document.getElementById("englishInput").value,c=document.getElementById("chineseInput").value;if(!e||!c)return alert("Please complete both fields.");let d=load();d.unshift(["Personal",e,c]);save(d);document.getElementById("englishInput").value="";document.getElementById("chineseInput").value="";render()}
function removeItem(i){let d=load();d.splice(i,1);save(d);render()}
render();
</script>
</body>
</html>
